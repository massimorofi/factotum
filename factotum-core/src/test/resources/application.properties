# Test profile configuration for Factotum AI
%test.quarkus.http.port=8081
%test.factotum.api-key=test-token-secure

# Disable queue poller during tests to avoid virtual threads hitting DB
%test.factotum.queue.poller-enabled=false

# Use H2 in-memory database for testing (no PostgreSQL needed)
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.jdbc.username=sa
%test.quarkus.datasource.jdbc.password=

# Disable Flyway during tests (H2 doesn't support pgmq extension)
%test.quarkus.flyway.migrate-at-start=false

# OpenAI / LLM config for WireMock routing
%test.openai.api.base=http://localhost:1234/v1
%test.openai.api-key=test-mock-key
